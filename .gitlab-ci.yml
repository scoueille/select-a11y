image: node:22-bookworm

stages:
  - test
  - deploy

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
  policy: pull-push

before_script:
  - node --version
  - npm --version
  - npm ci --cache .npm --prefer-offline

test:
  stage: test
  script:
    - npm run build
    - npm test

pages:
  stage: deploy
  script:
    - npm run build
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
